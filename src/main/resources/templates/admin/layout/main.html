<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <!-- Basic meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Dynamic page title with fallback -->
    <title th:text="${pageTitle} ?: 'Hoang Luong Tran - Blog'">
      Hoang Luong Tran - Blog
    </title>

    <!-- SEO meta tags -->
    <meta
      name="description"
      content="Personal blog of Hoàng Lương Trần, sharing insights on technology, programming, and personal development."
    />
    <meta name="author" content="hoangluongtran" />

    <!-- Google Fonts - Inter from bunny.net -->
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link
      href="https://fonts.bunny.net/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS Play CDN (development only) -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <!-- Tailwind CSS v4 custom configuration -->
    <style type="text/tailwindcss">
      /* Class based admin dark mode variant */
      @custom-variant admin-dark (&:where(.admin-dark, .admin-dark *));

      /* Theme configuration */
      @theme {
        /* Font family */
        --default-font-family: "Inter";
      }
    </style>

    <!-- Admin dark mode initialization script -->
    <script>
      // Apply admin dark mode before Alpine.js initializes
      (function () {
        try {
          const adminDarkMode = localStorage.getItem("adminDarkMode");
          if (adminDarkMode === "true") {
            document.documentElement.classList.add("admin-dark");
          }
        } catch (e) {
          console.warn("Could not access localStorage:", e);
        }
      })();
    </script>

    <!-- Alpine.js for interactivity -->
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <!-- HTMX for AJAX interactions -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine.js x-cloak styling -->
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>

  <body class="antialiased">
    <!-- Main page container with Alpine.js data -->
    <div
      x-data="{
        adminDarkMode: localStorage.getItem('adminDarkMode') === 'true',
        profileDropdownOpen: false,
        init() {
          this.applyAdminDarkMode();
        },
        applyAdminDarkMode() {
          if (this.adminDarkMode) {
            document.documentElement.classList.add('admin-dark');
          } else {
            document.documentElement.classList.remove('admin-dark');
          }
        },
        toggleAdminDarkMode() {
          this.adminDarkMode = !this.adminDarkMode;
          localStorage.setItem('adminDarkMode', this.adminDarkMode);
          this.applyAdminDarkMode();
        },
        toggleProfileDropdown() {
          this.profileDropdownOpen = !this.profileDropdownOpen;
        },
        closeProfileDropdown() {
          this.profileDropdownOpen = false;
        },
        logout() {
          if (confirm('Are you sure you want to logout?')) {
            window.location.href = 'login.html';
          }
          this.closeProfileDropdown();
        },
      }"
      class="relative min-h-dvh min-w-80 bg-zinc-100 text-zinc-800 admin-dark:bg-zinc-950 admin-dark:text-zinc-100"
    >
      <!-- Background pattern -->
      <div
        class="absolute inset-x-0 -top-px h-[600px] bg-zinc-50 bg-[image:repeating-linear-gradient(135deg,_currentColor_0,_currentColor_1px,_transparent_0,_transparent_50%)] [mask-image:linear-gradient(180deg,white,rgba(255,255,255,0))] bg-[size:10px_10px] text-zinc-400/10 admin-dark:bg-zinc-950 admin-dark:text-zinc-100/10"
        aria-hidden="true"
      ></div>

      <!-- Main content wrapper -->
      <main
        id="page-content"
        class="relative mx-auto flex min-h-dvh max-w-7xl flex-auto flex-col border-x border-zinc-200 bg-white p-6 ring-4 ring-zinc-200/25 lg:px-40 lg:py-8 admin-dark:border-zinc-800 admin-dark:bg-zinc-900 admin-dark:ring-zinc-900"
      >
        <!-- Admin dark mode toggle component -->
        <div
          th:replace="~{admin/fragments/dark-mode-toggle :: dark-mode-toggle}"
        ></div>

        <!-- Header component with active page parameter -->
        <div
          th:replace="~{admin/fragments/header :: header(${activePage})}"
        ></div>

        <!-- Separator component -->
        <div th:replace="~{admin/fragments/separator :: separator}"></div>

        <!-- Main content area (replaced by individual admin pages) -->
        <div layout:fragment="content"></div>

        <!-- Footer component -->
        <div th:replace="~{admin/fragments/footer :: footer}"></div>
      </main>
      <!-- END Main content wrapper -->
    </div>
    <!-- END Main page container -->
  </body>
</html>
