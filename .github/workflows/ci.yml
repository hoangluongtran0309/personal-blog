name: CI

on:
  push:
    branches:
      - feature/**

  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build backend
        run: mvn clean compile

      - name: Run tests (PR only)
        if: github.event_name == 'pull_request'
        run: mvn test
