# Hero subtitle
hero.subtitle.blog=Chia sẻ kiến thức về lập trình, công nghệ và phát triển sản phẩm dựa trên những trải nghiệm thực tế của tôi. Hãy cùng tôi khám phá hành trình xây dựng và tối ưu phần mềm.
hero.subtitle.projects=Giới thiệu những dự án tiêu biểu của tôi trong phát triển web, hệ thống backend và kỹ thuật phần mềm. Mỗi dự án là một thử thách và lời giải sáng tạo.
hero.subtitle.contact=Bạn đang tìm đối tác kỹ thuật cho dự án tiếp theo? Tôi hiện nhận làm freelance và luôn sẵn sàng lắng nghe ý tưởng của bạn. Dù là ứng dụng web tùy chỉnh, giao diện tinh gọn hay backend có khả năng mở rộng, hãy cùng hợp tác để biến ý tưởng của bạn thành hiện thực.
hero.subtitle.admin=Tạo, chỉnh sửa và quản lý nội dung thật dễ dàng.
hero.subtitle.success=Tin nhắn của bạn đã được gửi thành công. Tôi sẽ xem và phản hồi sớm nhất có thể.

