<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <div th:fragment="list">
    <div class="mx-auto flex max-w-xl flex-col gap-12">
      <div class="group relative" th:each="project : ${projects}">
        <a
          th:href="@{/projects/{id}(id=${project.projectId.id})}"
          class="group flex flex-col rounded-3xl border border-zinc-200 hover:border-amber-500 hover:ring-4 hover:ring-amber-500/20 active:border-amber-600 dark:border-zinc-800 dark:hover:border-amber-600/50 dark:active:border-amber-600/75"
        >
          <div class="flex flex-col p-6">
            <div class="flex items-center gap-2">
              <div
                th:text="${project.projectCategory}"
                class="rounded-md bg-amber-100 px-2 py-1 text-xs font-semibold text-amber-700 dark:bg-amber-900/50 dark:text-amber-400"
              >
                Project category
              </div>
            </div>
            <h3
              th:text="${project.projectTitle}"
              class="mt-3 text-lg font-bold"
            >
              Project title
            </h3>
            <p
              th:text="${project.projectSummary}"
              class="mt-1 text-sm/relaxed text-zinc-500 dark:text-zinc-400"
            >
              Project summary
            </p>
            <div
              th:text="${#strings.capitalize(#temporals.format(project.publishDate, 'MMMM d, yyyy'))}"
              class="mt-2 text-xs font-medium text-zinc-400"
            >
              MMMM d, yyyy
            </div>
          </div>
        </a>
      </div>

      <div
        th:replace="~{fragments/pagination :: controls(page=${projects})}"
      ></div>
    </div>
  </div>
</html>
