<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/main}"
>
  <head>
    <title th:text="#{hero.title.projects}">Featured projects</title>
  </head>

  <body>
    <div layout:fragment="content" class="flex grow flex-col gap-16">
      <div class="text-center">
        <div
          th:text="#{hero.badge.projects}"
          class="mx-auto mb-2 inline-flex rounded-lg bg-zinc-100 px-2.5 py-1 text-sm font-medium text-zinc-500 dark:bg-zinc-800/50 dark:text-zinc-400"
        >
          I'm available for new projects
        </div>

        <h1
          th:text="#{hero.title.projects}"
          class="text-3xl font-black lg:text-5xl"
        >
          Featured projects
        </h1>

        <h2
          th:text="#{hero.subtitle.projects}"
          class="mx-auto mt-5 max-w-2xl leading-relaxed text-balance text-zinc-500 dark:text-zinc-400"
        >
          A showcase of my key projects in web development, backend systems, and
          software engineering. Each project highlights a technical challenge
          and the creative solutions behind it.
        </h2>
      </div>

      <div th:if="${projects != null and !projects.empty}">
        <div th:replace="~{projects/list :: list}"></div>
      </div>
    </div>
  </body>
</html>
